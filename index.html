<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a6fc4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/start.css" />
  <link rel="stylesheet" href="css/screens.css" />
  <title>Gym Balance</title>
</head>
<body>
<div id="app">

  <!-- START SCHERM -->
  <section class="screen active" id="screen-start">
    <div class="start-logo">
      <span class="logo-icon">🏋️</span>
      <div class="logo-title">GYM</div>
      <div class="logo-sub">BALANCE</div>
      <div class="logo-tagline">⚡ Houd de halter in balans! ⚡</div>
    </div>
    <div class="start-buttons">
      <button class="btn btn-green"  data-action="startGame">🏋️ START GAME</button>
      <button class="btn btn-orange" data-screen="highscores">🏆 HIGHSCORES</button>
      <button class="btn btn-gray"   data-screen="settings">⚙️ INSTELLINGEN</button>
    </div>
    <div class="start-best">Beste score: <strong id="start-best-val">0s</strong></div>
  </section>

  <!-- GAMEPLAY SCHERM -->
  <section class="screen" id="screen-game">
    <div class="page-title">Spel komt hier</div>
    <button class="btn btn-gray back-btn" data-screen="start">← Terug</button>
  </section>

  <!-- HIGHSCORES SCHERM -->
  <section class="screen" id="screen-highscores">
    <div class="page-title">🏆 Highscores</div>
    <button class="btn btn-gray back-btn" data-screen="start">← Terug</button>
  </section>

  <!-- INSTELLINGEN SCHERM -->
  <section class="screen" id="screen-settings">
    <div class="page-title">⚙️ Instellingen</div>
    <button class="btn btn-gray back-btn" data-screen="start">← Terug</button>
  </section>

</div>

<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
