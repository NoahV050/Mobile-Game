<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GymBalance" />
  <meta name="theme-color" content="#1a6fc4" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/screens.css" />
  <link rel="stylesheet" href="css/start.css" />
  <title>Gym Balance </title>
</head>
<body>
<div id="app">

  <!-- START SCHERM -->
  <section class="screen active" id="screen-start">
    <div class="start-logo">
      <span class="logo-icon">🏋️</span>
      <div class="logo-title">GYM</div>
      <div class="logo-sub">BALANCE</div>
      <div class="logo-tagline">⚡ Houd de halter in balans! ⚡</div>
    </div>
    <div class="start-barbell-wrap">
      <canvas id="canvas-start" width="280" height="110"></canvas>
    </div>
    <div class="start-buttons">
      <button class="btn btn-green"  data-action="startGame">🏋️ START GAME</button>
      <button class="btn btn-orange" data-screen="highscores">🏆 HIGHSCORES</button>
      <button class="btn btn-gray"   data-screen="settings">⚙️ INSTELLINGEN</button>
    </div>
    <div class="start-best">Beste score: <strong id="start-best-val">0s</strong></div>
  </section>

<!--Game scherm  -->
  <section class="screen" id="screen-game">
    <div class="game-header">
      <div class="game-ceiling">
        <div class="spotlight spotlight-1"></div>
        <div class="spotlight spotlight-2"></div>
      </div>
      <div class="game-floor"></div>
      <div class="hud">
        <div class="hud-pill">
          <div class="hud-label">Tijd</div>
          <div class="hud-val" id="hud-time">0s</div>
        </div>
        <div class="hud-pill">
          <div class="hud-label">Score</div>
          <div class="hud-val" id="hud-score">0</div>
        </div>
      </div>
    </div>
    <div class="play-area">`
      <span id="lifter">🧑‍🦰</span>
      <canvas id="barbell-canvas" width="300" height="90"></canvas>
    <div class="balance-track">
      <div class="balance-thumb" id="balance-thumb"></div>
    </div>
    <div class="instr" id="instr-text">📱 Kantel je telefoon!</
    </div>
    </div> class="controls">
      <button class="ctrl-btn" id="btn-left">◀</button>
      <div class="ctrl-center">
        <button class="ctrl-btn" id="btn-restart">🔄</button>
        <button class="ctrl-btn" id="btn-home">🏠</button>
      </div>
      <button class="ctrl-btn" id="btn-right">▶</button>
    </div>
  </section>

  <!-- GAME OVER SCHERM -->
  <section class="screen" id="screen-gameover">
    <div class="go-title">GAME OVER!</div>
    <div class="go-emoji">😵</div>
    <div class="go-card">
      <div class="go-label">Jouw Score</div>
      <div class="go-score-val" id="go-score">0s</div>
      <div class="go-best">Best: <span id="go-best-val">0s</span></div>
      <div class="go-new-record" id="go-new-record">🎉 NIEUW RECORD!</div>
    </div>
    <div class="go-buttons">
      <button class="btn btn-green"  data-action="startGame">🔄 OPNIEUW</button>
      <button class="btn btn-blue"   data-screen="start">🏠 HOOFDMENU</button>
    </div>
  </section>
</div>

<!-- HIGHSCORES SCHERM -->
<section class="screen" id="screen-highscores">
  <h2>🏆 Highscores</h2>
  <p>Hier komen de scores...</p>
  <button data-screen="start">← Terug</button>
</section>

<!-- INSTELLINGEN SCHERM -->
<section class="screen" id="screen-settings">
  <h2>⚙️ Instellingen</h2>
  <p>Hier komen de instellingen...</p>
  <button data-screen="start">← Terug</button>
</section>

<!-- GAMEPLAY SCHERM -->
<section class="screen" id="screen-game">
  <p>Het spel start hier...</p>
</section>


<script src="js/ui.js"></script>
<script src="js/game.js"></script>
<script src="js/index.js"></script>
</body>
</html>
